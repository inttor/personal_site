name: Auto Deploy Docker  # 任务名称，保持不变

on:
  push:
    branches: [ master ]  # 触发条件：推送到master分支时执行
  # 可选：手动触发（需要时在GitHub Actions页面点"Run workflow"）
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest  # 使用GitHub免费Ubuntu环境
    steps:
      - name: SSH部署到火山云服务器
        uses: appleboy/ssh-action@master  # 官方SSH工具，稳定可靠
        with:
          host: 118.196.93.240  # 🔥 建议用统一命名，更清晰
          username: root  # 🔥 敏感信息全部用secrets，不要硬编码
          key: ${{ secrets.HUOSHANYUN }}  # 服务器SSH私钥，已正确配置
          script: |
            set -e  # 🔥 关键！任何命令失败立即退出，防止错误继续执行
            cd ~/personal_site/personal_site
            git stash  # 🔥 保护本地敏感文件（.env等），防止冲突
            git pull  # 拉取最新代码，不会影响未跟踪的敏感文件
            cd ./deploy
            # 构建并启动容器，--build确保镜像更新，-d后台运行
            docker compose -f docker-compose.server-a.yml up -d --build || true
            # 可选：验证部署结果（查看容器状态）
            docker ps | grep personal_site